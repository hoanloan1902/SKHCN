name: Robot Kiem Tra Van Ban

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lay code tu Github
        uses: actions/checkout@v3

      - name: 2. Cai dat Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Cai dat thu vien
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Cai dat Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 5. Chay Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          SKHCN_USER: ${{ secrets.SKHCN_USER }}
          SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
        run: python robot.py
