name: Quet Van Ban Den

on:
  schedule:
    # Chạy mỗi 30 phút (UTC+7 thì 1:00 - 17:00 UTC = 8:00 - 24:00 giờ VN)
    - cron: '*/30 1-17 * * 1-5'
  workflow_dispatch:  # Cho phép chạy tay từ tab Actions

jobs:
  quet:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # CẦN THIẾT để commit da_gui.json ngược lại repo

    steps:
      - name: Checkout repo (kèm da_gui.json từ lần trước)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cài Python và thư viện
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài thư viện cần thiết
        run: pip install selenium webdriver-manager requests

      - name: Cài Chrome (để Selenium dùng)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable

      - name: Chạy robot quét văn bản
        env:
          SKHCN_USER: ${{ secrets.SKHCN_USER }}
          SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python robot.py
