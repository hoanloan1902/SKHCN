name: Robot Quét Văn Bản Sở KHCN

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy mỗi 30 phút một lần
  workflow_dispatch: # Cho phép anh bấm nút "Run workflow" thủ công

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests pyTelegramBotAPI

      - name: Chạy Robot
        env:
          SKHCN_USER: ${{ secrets.SKHCN_USER }}
          SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python robot.py
