name: Quet_HSCV_Tu_Dong

# Thiết lập lịch chạy tự động
on:
  schedule:
    # 7h30 sáng VN (là 00:30 UTC)
    - cron: '30 0 * * *'
    # 14h00 chiều VN (là 07:00 UTC)
    - cron: '0 7 * * *'
  # Cho phép anh bấm nút "Run workflow" để chạy tay bất kỳ lúc nào trên GitHub
  workflow_dispatch:

jobs:
  run_scan:
    # Chạy trên hệ điều hành Ubuntu mới nhất
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ kho lưu trữ của anh về máy ảo GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Bước 2: Cài đặt ngôn ngữ Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Bước 3: Cài đặt các thư viện cần thiết để chạy code
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 gspread oauth2client pyTelegramBotAPI

      # Bước 4: Thực thi file Python quét dữ liệu
      # Lưu ý: file Python của anh nên đặt tên là 'main_scan.py' hoặc đổi lại cho khớp ở dòng cuối
      - name: Run Script
        env:
          # Đưa các biến bảo mật từ GitHub Secrets vào môi trường chạy
          SKHCN_USER: ${{ secrets.SKHCN_USER }}
          SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python robot.py
