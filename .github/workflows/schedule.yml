name: SKHCN Robot Dual Bot (Tele + Zalo)

on:
  schedule:
    # Chạy mỗi 30 phút từ 7h sáng đến 17h chiều (Giờ VN)
    # 0-10 UTC tương ứng 7h-17h VN
    - cron: '*/30 0-10 * * 1-5'
  workflow_dispatch: # Nút bấm để anh tự chạy kiểm tra ngay lập tức

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests selenium webdriver-manager

      - name: Run Robot Script
        env:
          # Các biến cũ của anh
          SKHCN_USER: ${{ secrets.SKHCN_USER }}
          SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 2 BIẾN MỚI CẦN THÊM VÀO ĐÂY ĐỂ CHẠY ZALO
          ZALO_TOKEN: ${{ secrets.ZALO_TOKEN }}
          MY_ZALO_ID: ${{ secrets.MY_ZALO_ID }}
        run: python robot.py

      - name: Save History and Push
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "GitHub Action Bot"
          git add da_gui.json
          git commit -m "Cập nhật danh sách văn bản đã gửi [skip ci]" || exit 0
          git push
