name: Telegram Bot

on:
  repository_dispatch:
    types: [telegram-webhook]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - run: pip install gspread oauth2client PyPDF2 requests
      
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          TELEGRAM_UPDATE: ${{ github.event.client_payload.update }}
        run: python bot_google_sheets.py
