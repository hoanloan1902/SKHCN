name: Quét văn bản đến HSCV

on:
  schedule:
    - cron: '*/30 0-14 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run scanner
      run: python scan.py
      env:
        SKHCN_USER: ${{ secrets.SKHCN_USER }}
        SKHCN_PASS: ${{ secrets.SKHCN_PASS }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        
    - name: Upload da_gui.json as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: da_gui_json
        path: da_gui.json
        retention-days: 7
